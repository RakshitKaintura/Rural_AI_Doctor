name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  # Deployment depends on tests passing first
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    # Optional: Uncomment the next line if you want to ensure tests pass before deploying
    # needs: test 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Move into the backend directory before deploying
          cd backend
          # --detach allows the CLI to trigger the build and exit, 
          # letting Railway's native dashboard handle the logs.
          railway up --service backend --detach