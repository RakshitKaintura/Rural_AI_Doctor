[pytest]
# 1. Path Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 2. Async Configuration
# 'auto' allows you to use 'async def' for tests without explicit decorators
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 3. Execution Options
addopts = 
    # Verbose output to see exactly which medical tests are running
    -v
    # Measure code coverage for the 'app' directory
    --cov=app
    # Generate an interactive HTML report to visualize untested diagnostic paths
    --cov-report=html
    # Show exactly which lines are missing coverage in the terminal
    --cov-report=term-missing
    # Suppress noise but keep critical alerts
    --disable-warnings
    # Force colors in terminal for better readability of pass/fail states
    --color=yes

# 4. Environment Variables for Testing
# Ensures tests don't accidentally write to production databases or LangSmith
env =
    ENVIRONMENT=testing
    DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/test_db
    REDIS_URL=memory://
    LANGCHAIN_TRACING_V2=false